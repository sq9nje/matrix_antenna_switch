<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6x2 Antenna Switch</title>
    <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light')</script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <main>
            <div class="antenna-grid">
                <div class="column" id="radio1-column">
                    <h2>Radio 1</h2>
                    <button class="antenna-btn disconnected active" data-radio="0" data-antenna="0">
                        Disconnected
                    </button>
                </div>

                <div class="column" id="names-column">
                    <h2>Antennas</h2>
                    <div class="antenna-name">-</div>
                </div>

                <div class="column" id="radio2-column">
                    <h2>Radio 2</h2>
                    <button class="antenna-btn disconnected active" data-radio="1" data-antenna="0">
                        Disconnected
                    </button>
                </div>
            </div>
        </main>

        <div class="bottom-bar">
            <a href="/status" class="status" id="status">
                Connecting...
            </a>
            <button class="theme-toggle" id="theme-toggle" title="Toggle theme">&#9790;</button>
            <a href="/settings" class="nav-link">Settings</a>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
